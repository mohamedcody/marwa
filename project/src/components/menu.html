<!-- السكريبت السحري لتشغيل التبويبات -->
<script>
  function openTab(evt, tabId) {
    // 1. إخفاء كل الأقسام
    const sections = document.querySelectorAll('.tab-section');
    sections.forEach(section => {
      section.classList.remove('active');
      section.classList.add('hidden');
    });

    // 2. إزالة التفعيل من كل الزراير
    const buttons = document.querySelectorAll('.tab-btn');
    buttons.forEach(btn => {
      btn.classList.remove('active');
    });

    // 3. إظهار القسم المطلوب وتفعيل الزرار اللي انداس عليه
    document.getElementById(tabId).classList.remove('hidden');
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
  }
</script>

 <script>
  function switchTab(tabName) {
    // 1. إخفاء كل الأقسام
    document.querySelectorAll('.tab-section').forEach(section => {
      section.classList.remove('active');
    });

    // 2. إلغاء التفعيل عن كل الزراير
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('active');
    });

    // 3. إظهار القسم المطلوب وتفعيل الزرار الخاص بيه
    if (tabName === 'orders') {
      document.getElementById('orders-tab').classList.add('active');
      document.getElementById('btn-orders').classList.add('active');
    } else if (tabName === 'sandwiches') {
      document.getElementById('sandwiches-tab').classList.add('active');
      document.getElementById('btn-sandwiches').classList.add('active');
    }
  }
</script>
<script>
    function moveNavIndicator() {
  const navList = document.querySelector('.nav-list');
  const activeItem = document.querySelector('.nav-item.active');
  const indicator = document.querySelector('.nav-indicator');

  if (activeItem && indicator && navList) {
    // حساب عرض ومكان الأيقونة النشطة بالنسبة للبار
    const itemRect = activeItem.getBoundingClientRect();
    const listRect = navList.getBoundingClientRect();

    // ضبط عرض ومكان المؤشر الأصفر
    indicator.style.width = `${itemRect.width}px`;
    indicator.style.left = `${itemRect.left - listRect.left}px`;
  }
}

// 1. تشغيل الحركة فور تحميل الصفحة
window.addEventListener('DOMContentLoaded', moveNavIndicator);

// 2. إعادة ضبط المكان لو مقاس الشاشة اتغير
window.addEventListener('resize', moveNavIndicator);

// 3. تحريك الصفار مباشرة عند الضغط على أي زرار
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function(e) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    this.classList.add('active');
    moveNavIndicator();
  });
});
</script>
